<!DOCTYPE html>
<html>
<head> 
    <h2>  HOW CAN WE HELP YOU?</h2>
    <title>Registration Form</title>
</head>
<body>
<form>
    <fieldset>
        <legend><b>Request for Proposal</b></legend>
        <table>
            <tr>
                <td>Your Company:</td>
                <td><input type="text" id= "yc" size="20"></td>
            </tr>

            <tr>
                <td>Email:</td>
                <td><input type="email" id="em" size="20"></td>
            </tr>

            <tr>
                <td>Username:</td>
                <td><input type="text" id= "un" size=20></td>
            </tr>

            <tr>
                <td>Password:</td>
                <td><input type="password"id="ps" size="20" ></td>
            </tr>

            <tr>
                <td>Your business:</td>
                <td>
                    <textarea placeholder= "Briefly describe your business in this space: "></textarea>
                   
                </td>
            </tr>

            <tr>
                <td valign="top"> Company Size:</td>
                <td>
                    <input type="radio" name="size"> Less than 10 <br>
                    <input type="radio" name="size"> 11 to 50 <br>
                    <input type="radio" name="size"> 50 to 200 <br>
                    <input type="radio" name="size"> Over 200<br>
                </td>
            </tr>

            <tr>
                <td>Services:</td>
                <td>
                    <input type="checkbox"> Brand Identity 
                    <input type="checkbox"> New Website 
                    <input type="checkbox"> Web Redesign
                    <br>
                    
                </td>
            </tr>

            <tr>
                <td>Timeline:</td>
                <td>
                    <select >
                        <option> imediately</option>
                        <option>1-2 weeks</option>
                        <option>3-6weeks</option>
                        <option>7-2 months</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td></td>
                <td><input type="submit" value="Send to dev/design"></td>
            </tr>
        </table>
    </fieldset>
</form>

</body>
</html>
